*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#04050e;font-family:'Casa',sans-serif;color:#fff;}

/* noise */
body::after{content:'';position:fixed;inset:0;opacity:.3;pointer-events:none;z-index:1;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.08'/%3E%3C/svg%3E");}

/* orbs */
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;animation:drift 14s ease-in-out infinite;}
.o1{width:700px;height:700px;background:radial-gradient(circle,rgba(140,82,255,.18),transparent 65%);top:-20%;left:-10%;animation-delay:0s;}
.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(192,132,252,.13),transparent 65%);bottom:-10%;right:-8%;animation-delay:-6s;}
.o3{width:300px;height:300px;background:radial-gradient(circle,rgba(57,70,162,.22),transparent 65%);top:45%;left:42%;animation-delay:-10s;}
@keyframes drift{0%,100%{transform:translate(0,0);}40%{transform:translate(24px,-18px);}70%{transform:translate(-18px,22px);}}

/* grid */
.grid{position:fixed;inset:0;pointer-events:none;z-index:2;
  background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(ellipse 65% 65% at 50% 50%,black 20%,transparent 100%);}

/* scanline */
.scan{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(140,82,255,.35),transparent);animation:scanMove 7s linear infinite;pointer-events:none;z-index:3;}
@keyframes scanMove{from{top:-2%;}to{top:102%;}}

/* stage */
.stage{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:24px;text-align:center;}

/* logo svg */
.logo-svg{width:clamp(140px,18vw,220px);height:clamp(140px,18vw,220px);margin-bottom:clamp(16px,2.5vh,28px);
  animation:logoIn 1.4s cubic-bezier(.22,1,.36,1) both;}
.logo-svg img{width:100%;height:100%;object-fit:contain;animation:spin 9s linear infinite;}
@keyframes logoIn{from{opacity:0;transform:scale(.65) translateY(16px);filter:blur(18px);}to{opacity:1;transform:scale(1) translateY(0);filter:blur(0);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* brand */
.brand{font-family:'Casa',sans-serif;font-size:clamp(80px,14vw,150px);letter-spacing:.07em;line-height:1;
  background:linear-gradient(135deg,#8c52ff 0%,#a78bfa 35%,#c084fc 65%,#e879f9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:brandIn 1.1s .25s cubic-bezier(.22,1,.36,1) both;
  position:relative;}
.brand-blur{position:absolute;inset:0;font-family:'Casa',sans-serif;font-size:clamp(80px,14vw,150px);letter-spacing:.07em;line-height:1;
  background:linear-gradient(135deg,#8c52ff,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:blur(30px);opacity:.5;pointer-events:none;user-select:none;}
@keyframes brandIn{from{opacity:0;transform:translateY(28px) skewY(1.5deg);}to{opacity:1;transform:translateY(0) skewY(0);}}

/* line */
.rule{width:clamp(80px,12vw,160px);height:1px;margin:clamp(18px,3vh,28px) 0;
  background:linear-gradient(90deg,transparent,rgba(140,82,255,.55),transparent);
  animation:fadeUp 1s .6s both;}

/* coming soon text */
.cs-wrap{animation:fadeUp 1s .7s both;display:flex;flex-direction:column;align-items:center;gap:10px;}
.cs-pre{font-family:'Inter','Helvetica Neue',sans-serif;font-size:clamp(9px,1.2vw,11px);letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.2);}
.cs-text{font-family:'Casa',sans-serif;font-size:clamp(28px,5vw,58px);letter-spacing:.12em;text-transform:uppercase;
  background:linear-gradient(90deg,rgba(255,255,255,.9),rgba(192,132,252,.85),rgba(255,255,255,.85));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;}
/* glitch */
.cs-text::before,.cs-text::after{content:'COMING SOON';position:absolute;inset:0;
  background:inherit;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cs-text::before{animation:glitchA 5s infinite;clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);}
.cs-text::after{animation:glitchB 5s infinite;clip-path:polygon(0 60%,100% 60%,100% 75%,0 75%);}
@keyframes glitchA{0%,94%,100%{transform:translate(0);}95%{transform:translate(-3px,1px);filter:hue-rotate(90deg);}97%{transform:translate(2px,-1px);}}
@keyframes glitchB{0%,92%,100%{transform:translate(0);}93%{transform:translate(3px,-2px);filter:hue-rotate(-90deg);}96%{transform:translate(-2px,1px);}}

/* sub */
.sub{font-family:'Inter','Helvetica Neue',sans-serif;font-size:clamp(11px,1.4vw,14px);letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-top:clamp(18px,3vh,28px);animation:fadeUp 1s .9s both;}

/* notify */
.notify{margin-top:clamp(22px,3.5vh,36px);display:flex;gap:0;animation:fadeUp 1s 1.05s both;border-radius:12px;overflow:hidden;border:1px solid rgba(140,82,255,.22);box-shadow:0 0 48px rgba(124,58,237,.14);}
.notify input{padding:13px 20px;background:rgba(255,255,255,.04);border:none;outline:none;color:#fff;font-family:'Inter',sans-serif;font-size:13.5px;width:230px;backdrop-filter:blur(16px);}
.notify input::placeholder{color:rgba(255,255,255,.18);}
.notify button{padding:13px 20px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:.22s;white-space:nowrap;}
.notify button:hover{background:linear-gradient(135deg,#6366f1,#9333ea);}
.notify button.sent{background:linear-gradient(135deg,#059669,#10b981);}

/* domain */
.domain{margin-top:clamp(20px,3vh,32px);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.35em;color:rgba(255,255,255,.14);animation:fadeUp 1s 1.15s both;}

/* footer */
.footer{position:fixed;bottom:24px;z-index:20;display:flex;gap:26px;animation:fadeUp 1s 1.2s both;}
.footer span{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.17);cursor:pointer;transition:color .2s;}
.footer span:hover{color:rgba(167,139,250,.65);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
